<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝牙开锁</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f2f5;
        }
        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 360px;
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 24px; color: #1a1a2e; }
        .status-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
            border-left: 4px solid #ccc;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }
        .status-box.connected { border-left-color: #22c55e; background: #f0fdf4; }
        .status-box.error { border-left-color: #ef4444; background: #fef2f2; }
        .status-box.waiting { border-left-color: #eab308; background: #fefce8; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
        .btn-success { background: #22c55e; color: white; }
        .btn-success:hover:not(:disabled) { background: #16a34a; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover:not(:disabled) { background: #dc2626; }
        .btn-outline { background: #e5e7eb; color: #333; }
        .btn-outline:hover:not(:disabled) { background: #d1d5db; }
        .log-box {
            margin-top: 16px;
            padding: 12px;
            background: #1e1e2e;
            color: #a6e22e;
            font-family: "Courier New", monospace;
            font-size: 12px;
            border-radius: 8px;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-box .log-error { color: #f92672; }
        .log-box .log-success { color: #a6e22e; }
        .log-box .log-info { color: #66d9ef; }
        .note {
            margin-top: 12px;
            font-size: 12px;
            color: #999;
        }
        .pwd-input-area {
            margin: 12px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .pwd-input-area input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            min-width: 150px;
        }
        .pwd-input-area input[type="text"]:focus {
            border-color: #2563eb;
        }
        .pwd-input-area button {
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .pwd-input-area button:hover { background: #1d4ed8; }
        .pwd-input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
        .remember-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #555;
            margin-top: 4px;
            width: 100%;
        }
        .remember-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔓 蓝牙开锁</h1>

    <div id="status" class="status-box">⚪ 未连接</div>

    <!-- 密码输入区 + 记住密码 -->
    <div class="pwd-input-area">
        <input type="text" id="pwdInput" placeholder="输入密码 qiulin520" disabled>
        <button id="btnSendPwd" disabled>验证</button>
        <div class="remember-row">
            <input type="checkbox" id="rememberPwd">
            <label for="rememberPwd">记住密码</label>
        </div>
    </div>

    <button id="btnScan" class="btn btn-primary">📡 扫描并连接</button>
    <button id="btnDisconnect" class="btn btn-outline" disabled>断开连接</button>

    <div id="log" class="log-box">📋 日志</div>
    <div class="note">💡 需 Chrome/Edge 浏览器，支持 Web Bluetooth</div>
</div>

<script>
    // ============================================================
    // 配置
    // ============================================================
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const RX_CHAR_UUID  = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    const TX_CHAR_UUID  = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
    const PASSWORD = "qiulin520";

    // ============================================================
    // DOM
    // ============================================================
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const btnScan = document.getElementById('btnScan');
    const btnDisconnect = document.getElementById('btnDisconnect');
    const btnSendPwd = document.getElementById('btnSendPwd');
    const pwdInput = document.getElementById('pwdInput');
    const rememberPwdChk = document.getElementById('rememberPwd');

    // ============================================================
    // 状态
    // ============================================================
    let device = null;
    let server = null;
    let rxCharacteristic = null;
    let txCharacteristic = null;
    let isAuthenticated = false;

    // ============================================================
    // 密码存储
    // ============================================================
    function loadSavedPassword() {
        try {
            const saved = localStorage.getItem('bt_password');
            if (saved) {
                pwdInput.value = saved;
                rememberPwdChk.checked = true;
                log('已加载保存的密码', 'info');
            }
        } catch (e) {}
    }

    function savePassword(pwd) {
        try {
            if (rememberPwdChk.checked) {
                localStorage.setItem('bt_password', pwd);
                log('密码已保存', 'success');
            } else {
                localStorage.removeItem('bt_password');
            }
        } catch (e) {}
    }

    // ============================================================
    // 日志 & UI
    // ============================================================
    function log(msg, type = 'info') {
        const time = new Date().toLocaleTimeString();
        const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
        const cls = type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : 'log-info';
        logEl.innerHTML += `<div class="${cls}">${prefix} [${time}] ${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text, state = '') {
        statusEl.textContent = text;
        statusEl.className = 'status-box' + (state ? ' ' + state : '');
    }

    function setUI(connected, authenticated = false) {
        btnScan.disabled = connected;
        btnDisconnect.disabled = !connected;
        // 验证按钮：连接时可用，且无论是否验证都可用（已验证时变更为"开锁"）
        btnSendPwd.disabled = !connected;
        pwdInput.disabled = !connected;

        if (authenticated) {
            btnSendPwd.textContent = '🔓 开锁';
            btnSendPwd.className = 'btn btn-success'; // 变绿色
            pwdInput.placeholder = '✅ 已验证';
            // 密码框不可编辑但保留显示
        } else {
            btnSendPwd.textContent = '验证';
            btnSendPwd.className = 'btn btn-primary';
            pwdInput.placeholder = connected ? '输入密码' : '请先连接';
        }
    }

    // ============================================================
    // 核心 BLE
    // ============================================================
    async function scanAndConnect() {
        if (!navigator.bluetooth) {
            log('浏览器不支持 Web Bluetooth，请使用 Chrome/Edge', 'error');
            setStatus('❌ 不支持', 'error');
            return;
        }

        try {
            setStatus('⏳ 扫描中...', '');
            log('开始扫描设备（显示所有蓝牙设备）...');

            // 显示所有设备，不按名称过滤
            device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });

            log('已选择: ' + (device.name || '未知设备'), 'success');
            setStatus('⏳ 连接中...');

            server = await device.gatt.connect();
            log('GATT 连接成功', 'success');

            const service = await server.getPrimaryService(SERVICE_UUID);
            log('找到服务', 'success');

            rxCharacteristic = await service.getCharacteristic(RX_CHAR_UUID);
            txCharacteristic = await service.getCharacteristic(TX_CHAR_UUID);
            log('找到读写特征', 'success');

            await txCharacteristic.startNotifications();
            txCharacteristic.addEventListener('characteristicvaluechanged', handleNotification);
            log('已开启通知', 'success');

            isAuthenticated = false;
            setStatus('✅ 已连接，请输入密码', 'connected');
            setUI(true, false);
            log('连接完成，请输入密码', 'info');

            pwdInput.focus();

        } catch (err) {
            log('连接失败: ' + err.message, 'error');
            setStatus('❌ 连接失败', 'error');
            setUI(false, false);
            device = null;
            server = null;
            rxCharacteristic = null;
            txCharacteristic = null;
        }
    }

    function handleNotification(event) {
        const value = event.target.value;
        const text = new TextDecoder().decode(value);
        log('📩 收到: ' + text, 'info');

        if (text.includes('Authenticated') || text.includes('认证成功')) {
            isAuthenticated = true;
            // 密码正确 → 保存密码（如果勾选了记住）
            savePassword(pwdInput.value.trim());

            setStatus('✅ 验证通过，点击"开锁"发送指令', 'connected');
            setUI(true, true);  // 切换按钮为"开锁"
            log('密码验证通过，请点击"开锁"按钮', 'success');
            // 自动发送一次180（可选），也可以等待用户点击。这里自动发送一次，然后按钮可继续点击
            setTimeout(() => {
                sendAngle(180);
            }, 300);
        } else if (text.includes('Wrong') || text.includes('错误')) {
            isAuthenticated = false;
            setStatus('❌ 密码错误，请重新输入', 'error');
            setUI(true, false);
            log('密码错误，请重新输入', 'error');
            pwdInput.value = '';
            pwdInput.focus();
            localStorage.removeItem('bt_password');
            rememberPwdChk.checked = false;
        }
    }

    async function sendAngle(angle) {
        if (!rxCharacteristic) {
            log('未连接，无法发送', 'error');
            return;
        }
        try {
            const data = String(angle);
            const encoder = new TextEncoder();
            await rxCharacteristic.writeValue(encoder.encode(data));
            log('📤 发送: ' + data + '° (开锁)', 'success');
            setStatus('🔓 已开锁！', 'connected');
        } catch (err) {
            log('发送失败: ' + err.message, 'error');
        }
    }

    // 统一处理发送密码/开锁
    async function handleSendAction() {
        if (!rxCharacteristic) {
            log('未连接', 'error');
            return;
        }

        if (isAuthenticated) {
            // 已验证 → 发送开锁指令
            sendAngle(180);
        } else {
            // 未验证 → 发送密码
            const pwd = pwdInput.value.trim();
            if (pwd === '') {
                log('请输入密码', 'error');
                return;
            }
            log('发送密码...', 'info');
            try {
                const encoder = new TextEncoder();
                await rxCharacteristic.writeValue(encoder.encode(pwd));
                setStatus('⏳ 验证中...', 'waiting');
                btnSendPwd.disabled = true; // 暂时禁用，等待回复
            } catch (err) {
                log('发送密码失败: ' + err.message, 'error');
                setStatus('❌ 发送失败', 'error');
            }
        }
    }

    async function disconnect() {
        try {
            if (device && device.gatt) device.gatt.disconnect();
        } catch (e) {}
        device = null;
        server = null;
        rxCharacteristic = null;
        txCharacteristic = null;
        isAuthenticated = false;
        setStatus('⚪ 已断开', '');
        setUI(false, false);
        log('已断开连接', 'info');
    }

    // ============================================================
    // 事件绑定
    // ============================================================
    btnScan.addEventListener('click', scanAndConnect);
    btnDisconnect.addEventListener('click', disconnect);
    btnSendPwd.addEventListener('click', handleSendAction);

    pwdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSendAction();
        }
    });

    window.addEventListener('beforeunload', () => {
        if (device && device.gatt) try { device.gatt.disconnect(); } catch(e) {}
    });

    // ============================================================
    // 初始化：加载保存的密码
    // ============================================================
    loadSavedPassword();
    setUI(false, false);
    log('就绪，点击"扫描并连接"', 'info');
</script>
</body>
</html>
